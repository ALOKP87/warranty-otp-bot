name: WarrantyBot

on:
 workflow_dispatch:

jobs:

 run-bot:

  runs-on: ubuntu-latest

  steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
     node-version: 20

  - name: Install Dependencies
    run: npm install

  - name: Start Bot
    env:
     FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
    run: node index.js
