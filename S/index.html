<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🔥 GLOBAL */
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  overflow:hidden;
}

/* 🔥 GLASS */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}

/* 🔥 LAYOUT */
#app {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo {
  font-size:22px;
  font-weight:600;
  margin-bottom:20px;
}

/* PROJECT LIST */
.project-item {
  padding:10px;
  margin:5px 0;
  cursor:pointer;
  border-radius:10px;
  transition:0.3s;
}

.project-item:hover {
  background:rgba(255,255,255,0.1);
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:15px;
}

/* TOPBAR */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

/* CHAT */
.chat-area {
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MESSAGE */
.message {
  max-width:70%;
  padding:12px;
  margin:10px 0;
  border-radius:15px;
  animation:fadeUp 0.3s ease;
}

.user {
  background:#2563eb;
  margin-left:auto;
}

.ai {
  background:rgba(255,255,255,0.1);
}

/* INPUT */
.input-area {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  outline:none;
}

button {
  padding:12px 16px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

/* DEBUG PANEL */
#debugPanel {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:250px;
  background:black;
  color:#00ff88;
  font-size:12px;
  overflow:auto;
  display:none;
  padding:10px;
}

/* FLOAT BUTTON */
.debug-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  border-radius:50%;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div class="sidebar glass">
  <div class="logo">⚡ AI SYSTEM</div>

  <div id="projects"></div>

  <button onclick="createProject()">+ Project</button>
</div>

<!-- MAIN -->
<div class="main glass">

  <div class="topbar">
    <span>Chat</span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chatArea" class="chat-area"></div>

  <div class="input-area">
    <input id="input" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>

</div>

</div>

<!-- DEBUG PANEL -->
<div id="debugPanel"></div>

<!-- DEBUG BUTTON -->
<div class="debug-btn" onclick="toggleDebug()">🐞</div>

<script>

/* 🔥 DEBUG SYSTEM */
function log(msg) {
  const panel = document.getElementById("debugPanel");
  panel.innerHTML += msg + "<br>";
  panel.scrollTop = 999999;
}

function toggleDebug() {
  const panel = document.getElementById("debugPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

/* 🔥 SAMPLE UI LOGIC */

function createProject() {
  log("Creating project...");
}

function send() {
  const input = document.getElementById("input").value;

  render(input, "user");
  log("User: " + input);

  setTimeout(() => {
    render("AI response...", "ai");
    log("AI replied");
  }, 1000);
}

function render(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  document.getElementById("chatArea").appendChild(div);
}

function logout() {
  log("Logout clicked");
}

</script>

</body>
</html>
